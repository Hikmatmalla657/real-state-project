{% extends "base.html" %}

{% block title %}Edit Property - EstateHub{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card">
                <h2 class="gradient-text mb-4">Edit Property</h2>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Property Title *</label>
                            <input type="text" name="title" class="form-control" value="{{ property.title }}" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Description *</label>
                            <textarea name="description" class="form-control" rows="4" required>{{ property.description }}</textarea>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Property Type *</label>
                            <select name="property_type" class="form-select" required>
                                <option value="House" {% if property.property_type == 'House' %}selected{% endif %}>House</option>
                                <option value="Apartment" {% if property.property_type == 'Apartment' %}selected{% endif %}>Apartment</option>
                                <option value="Villa" {% if property.property_type == 'Villa' %}selected{% endif %}>Villa</option>
                                <option value="Condo" {% if property.property_type == 'Condo' %}selected{% endif %}>Condo</option>
                                <option value="Land" {% if property.property_type == 'Land' %}selected{% endif %}>Land</option>
                                <option value="Commercial" {% if property.property_type == 'Commercial' %}selected{% endif %}>Commercial</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Price (USD) *</label>
                            <input type="number" name="price" class="form-control" step="0.01" value="{{ property.price }}" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Street Address *</label>
                            <input type="text" name="address" class="form-control" value="{{ property.address }}" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">City *</label>
                            <input type="text" name="city" class="form-control" value="{{ property.city }}" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">State/Province</label>
                            <input type="text" name="state" class="form-control" value="{{ property.state or 'Bagmati' }}">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Zip Code</label>
                            <input type="text" name="zipcode" class="form-control" value="{{ property.zipcode or '' }}">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Bedrooms</label>
                            <input type="number" name="bedrooms" class="form-control" value="{{ property.bedrooms or '' }}">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Bathrooms</label>
                            <input type="number" name="bathrooms" class="form-control" value="{{ property.bathrooms or '' }}">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Area (sq ft)</label>
                            <input type="number" name="area" class="form-control" step="0.01" value="{{ property.area or '' }}">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="available" {% if property.status == 'available' %}selected{% endif %}>Available</option>
                                <option value="sold" {% if property.status == 'sold' %}selected{% endif %}>Sold</option>
                                <option value="rented" {% if property.status == 'rented' %}selected{% endif %}>Rented</option>
                            </select>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Update Property Image</label>
                            {% if property.image_filename %}
                            <div class="mb-2">
                                <img src="{{ url_for('static', filename='uploads/' + property.image_filename) }}" 
                                     style="max-width: 300px; border-radius: var(--radius-md);">
                            </div>
                            {% endif %}
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <small class="text-muted">Leave empty to keep current image</small>
                        </div>
                        
                        <div class="col-12">
                            <button type="submit" class="btn btn-submit">
                                <i class="fas fa-save me-2"></i> Update Property
                            </button>
                            <a href="{{ url_for('main.agent_dashboard') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
