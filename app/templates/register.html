{% extends "base.html" %}

{% block title %}Register - EstateHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="form-card">
                <div class="text-center mb-4">
                    <div style="width: 80px; height: 80px; background: var(--secondary-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                        <i class="fas fa-user-plus" style="font-size: 2.5rem; color: white;"></i>
                    </div>
                    <h2 class="mb-2">Create Account</h2>
                    <p style="color: #666;">Join EstateHub today</p>
                </div>
                
                <form method="POST" id="registerForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Username <span style="color: var(--accent);">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" name="username" required minlength="3">
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Email <span style="color: var(--accent);">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                <input type="text" class="form-control" name="full_name">
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control" name="phone">
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">I want to <span style="color: var(--accent);">*</span></label>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <input type="radio" class="btn-check" name="role" value="user" id="role-user" checked>
                                    <label class="btn btn-outline-primary w-100" for="role-user" style="padding: 1rem; border: 2px solid #e0e0e0; border-radius: 10px;">
                                        <i class="fas fa-search-location d-block mb-2" style="font-size: 2rem;"></i>
                                        <strong>Find Property</strong>
                                    </label>
                                </div>
                                <div class="col-md-6">
                                    <input type="radio" class="btn-check" name="role" value="agent" id="role-agent">
                                    <label class="btn btn-outline-primary w-100" for="role-agent" style="padding: 1rem; border: 2px solid #e0e0e0; border-radius: 10px;">
                                        <i class="fas fa-building d-block mb-2" style="font-size: 2rem;"></i>
                                        <strong>List Property</strong>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Password <span style="color: var(--accent);">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required minlength="8">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
                                    <i class="fas fa-eye" id="password-icon"></i>
                                </button>
                            </div>
                            <small style="color: #666;">Use at least 8 characters</small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Confirm Password <span style="color: var(--accent);">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>
                            <small class="text-danger d-none" id="password-match-error">Passwords do not match</small>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-submit mt-4">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p style="color: #666;">
                        Already have an account? 
                        <a href="{{ url_for('main.login') }}" class="gradient-text" style="font-weight: 600;">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(fieldId + '-icon');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

document.getElementById('confirm_password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const error = document.getElementById('password-match-error');
    if (this.value && this.value !== password) {
        error.classList.remove('d-none');
    } else {
        error.classList.add('d-none');
    }
});

document.getElementById('registerForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    if (password !== confirm) {
        e.preventDefault();
        alert('Passwords do not match!');
    }
});
</script>
{% endblock %}
